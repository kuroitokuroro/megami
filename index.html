<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="favicon.jpg" />
  <link rel="apple-touch-icon" href="favicon.jpg" />

  <title>物体迷宮</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="game-shell">
    <section class="game-frame" aria-label="物体迷宮">
      <div id="effectLayer" class="effect-layer" aria-hidden="true"></div>
      <div class="top-row">
        <div id="floorDisplay" class="floor-display">Ｆ１</div>
        <div id="progressGauge" class="progress-gauge"></div>
      </div>

      <div class="theme-row">
        <span id="themeDisplay">冷蔵庫の階</span>
      </div>

      <section id="textWindow" class="text-window" aria-live="polite">
        <p>物体迷宮に入った。</p>
      </section>

      <section class="move-actions" aria-label="移動操作">
        <button id="forwardButton" type="button">進む</button>
        <button id="backButton" type="button">戻る</button>
      </section>

      <section class="battle-actions" aria-label="戦闘操作">
        <button id="attackButton" type="button">こうげき</button>
        <button id="magicButton" type="button">魔法</button>
        <button id="escapeButton" type="button">逃げる</button>
      </section>

      <section class="menu-actions" aria-label="メニュー">
        <button type="button" data-menu="能力">能力</button>
        <button type="button" data-menu="アイテム">アイテム</button>
        <button type="button" data-menu="装備">装備</button>
        <button type="button" data-menu="スキル">スキル</button>
        <button type="button" data-menu="設定">設定</button>
      </section>
    </section>
  </main>

  <script src="main.js"></script>
</body>

</html>
